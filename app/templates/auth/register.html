{% extends "base.html" %}

{% block title %}Register - YChat 2.0{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Create your account</h1>
    <p>Choose a username and a strong password.</p>

    <form class="form" method="post">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" minlength="3" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>

      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>

      <button class="button button-primary" type="submit">Register</button>
    </form>

    <p class="muted">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>.</p>
  </section>
{% endblock %}
